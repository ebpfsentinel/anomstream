[graph]
# Platform-specific deps are audited separately; this file covers
# the default target. Add more targets if the crate starts shipping
# platform-gated code.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]
all-features = true

[advisories]
version = 2
ignore = []

[licenses]
version = 2
# Apache-2.0 parent crate → compatible downstream licenses only.
#
# MPL-2.0 is intentionally NOT in the blanket allow list. Under
# MPL-2.0 source disclosure is required for modified MPL files
# when distributed as a combined work; static linking from a
# proprietary binary is safe only when the MPL source stays
# unmodified. Consumers who static-link the whole dependency
# tree into a closed-source product must audit individual MPL
# crates themselves. Add per-crate exceptions in `exceptions`
# below (with a justification comment) rather than re-enabling
# MPL globally.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]
exceptions = []
confidence-threshold = 0.9

[bans]
# Denying multiple versions catches supply-chain bloat and the
# classic "pin 1.0, pull 2.0 via transitive" vector.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Acknowledged duplicates that do not ship in the release
# dependency graph. Removing each requires an upstream bump we
# do not control.
skip = [
    # `getrandom 0.4` arrives exclusively via `proptest → tempfile
    # → rusty-fork`, all dev-dependencies. The release binary
    # still links a single `getrandom 0.3`. Revisit when
    # proptest ships an update pinning tempfile on the same
    # major as `rand`.
    { name = "getrandom", version = "0.4" },
]

[sources]
# Only crates.io is authoritative. git deps must be on a vetted
# host AND committed with a `rev = "…"` pin (enforced by graph).
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
