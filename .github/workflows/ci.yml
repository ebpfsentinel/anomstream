name: CI

# on:
#   push:
#     branches: [main]
#   pull_request:
#     branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo clippy --workspace --no-default-features -- -D warnings

  no_std:
    name: no_std build (core, triage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p anomstream-core --no-default-features
      - run: cargo check -p anomstream-core --no-default-features --features serde
      - run: cargo check -p anomstream-triage --no-default-features
      - run: cargo check -p anomstream-triage --no-default-features --features serde

  feature_matrix:
    name: meta facade feature matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "core"
          - "core,std"
          - "core,std,serde"
          - "core,triage"
          - "core,triage,std,serde"
          - "core,hotpath"
          - "core,triage,hotpath"
          - "core,parallel,postcard,serde_json"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p anomstream --no-default-features --features "${{ matrix.features }}"

  test:
    name: test (${{ matrix.os }}, ${{ matrix.rust }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable, "1.95"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features
      - run: cargo test --workspace --no-default-features --features "anomstream-core/std"

  doc:
    name: cargo doc (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # 16 pre-existing intra-doc link warnings survive from v0.1.0;
      # cleanup deferred to a dedicated pass. Build must still succeed.
      - run: cargo doc --workspace --all-features --no-deps

  bench-compile:
    name: cargo bench --no-run (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --workspace --no-run

  examples:
    name: cargo build --examples (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --examples --all-features

  publish-dry-run:
    name: cargo publish --dry-run (anomstream-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Only core can dry-run before first publication — triage /
      # hotpath / meta depend on `anomstream-core` by version
      # string and cargo's dry-run resolves that against crates.io,
      # which rejects until core has actually been published once.
      # After the first publish, enable the full chain here (order
      # matters: core → triage → hotpath → anomstream facade).
      - run: cargo publish --dry-run -p anomstream-core --allow-dirty

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  machete:
    name: cargo machete (unused deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bnjbvr/cargo-machete@main

  sbom:
    name: CycloneDX SBOM (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install --locked cargo-cyclonedx
      - run: cargo cyclonedx --format json --all-features
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: "**/*.cdx.json"
          if-no-files-found: error
